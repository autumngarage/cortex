[manifest]
verified_threshold_days = 90

[audit-instructions]
homebrew_tap = "autumngarage/cortex"
github_releases = ["autumngarage/cortex"]
scan_files = ["CLAUDE.md", "AGENTS.md", "README.md"]
# URLs that return 403 to a bare HEAD/GET but render fine for real clients.
# shields.io badge endpoints need an image Accept header; forum.cursor.com is
# anonymous-gated. These are documented citations, not broken links — their
# 403 is downgraded to a visible "expected 403 (allowlisted)" info line rather
# than a warning. fnmatch globs; only a 403 is suppressed (other codes warn).
expected_403 = [
  "https://img.shields.io/*",
  "https://forum.cursor.com/*",
]

[journal.t1_9]
mode = "stage"

[refresh-index]
candidate_patterns = [
  "we decided",
  "doctrine candidate",
  "this is load-bearing",
]

[doctrine.append-only]
# 866be5764448 backfilled Load-priority: always onto doctrines 0001–0004 before
# the immutable-Doctrine invariant existed (SPEC v0.3.0-dev, 2026-04-17).
# The violation is real but pre-invariant; grandfathered here so cortex doctor
# stops producing unfixable noise. See journal/2026-05-07-doctrine-append-only-grandfather.md.
grandfather-commits = ["866be5764448becf2973793cb18bc89aa4a2dff6"]
