name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        # Include the optional "hosted" extra so the hosted reviewer code
        # (GitHub App auth, the API transport) is actually exercised in CI —
        # its tests import jwt/cryptography/psycopg at module load, so without
        # the extra they fail at collection. DATABASE_URL-gated tests still
        # skip cleanly with no live database.
        run: uv sync --locked --extra hosted

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy src tests

      - name: Test
        run: uv run pytest

      - name: Doctor
        run: uv run cortex doctor
