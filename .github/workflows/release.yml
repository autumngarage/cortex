# Release workflow — auto-bumps the homebrew-cortex tap Formula
# whenever a GitHub Release is published in this repo.
#
# Two-step flow (machine handles only the deterministic half):
#   1. Human bumps version in __init__.py + pyproject.toml, tags, pushes,
#      runs `gh release create v0.X.Y --generate-notes` on main.
#   2. The `release.published` event below fires; the shared workflow in
#      autumngarage/autumn-garage rewrites Formula/cortex.rb's `url`
#      + `sha256` and commits to the tap's main directly. Users running
#      `brew upgrade cortex` get the new version immediately.
#
# Manual escape hatch: trigger via the GitHub UI's `Run workflow` button
# (or `gh workflow run release.yml -f tag_name=v0.X.Y`) to re-bump for a
# tag whose original release event is gone or failed.
#
# Required secret on this repo: HOMEBREW_TAP_PAT — classic PAT with
# `repo` scope on autumngarage/homebrew-cortex (a fine-grained token
# with contents:write on that one repo also works).

name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to bump the formula to (e.g. v0.2.6). Required for manual runs."
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag package metadata
        run: |
          expected_version="${RELEASE_TAG#v}"
          PYTHONPATH=src python -m cortex.release_integrity "$RELEASE_TAG" "$expected_version"

  bump-tap:
    # On the auto-trigger, skip prereleases — they shouldn't land in the
    # tap. Manual dispatch always runs so we can re-bump on demand.
    if: github.event_name == 'workflow_dispatch' || !github.event.release.prerelease
    needs: verify-tag
    uses: autumngarage/autumn-garage/.github/workflows/homebrew-bump.yml@v1
    with:
      formula-name: cortex
      tap-repo: autumngarage/homebrew-cortex
      tag-name: ${{ inputs.tag_name || github.event.release.tag_name }}
    secrets:
      HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
