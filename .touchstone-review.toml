# .touchstone-review.toml — per-project configuration for the AI review hook.
#
# Place this file at the repo root. The hook reads it automatically.
# Legacy .codex-review.toml is still supported as a fallback name.

[codex_review]
max_iterations = 3
max_diff_lines = 5000
cache_clean_reviews = true

# PR-triggered GitHub/Codex reviews are the review surface for Cortex.
# Keep Touchstone's merge path deterministic-only: merge-pr.sh still runs
# preflight and blocks requested changes / unresolved review threads, but the
# Conductor/Codex LLM pass below is disabled to avoid duplicate review spend.
safe_by_default = true

# Retained for easy rollback if Touchstone review is re-enabled later.
mode = "review-only"

unsafe_paths = [
  ".cortex/journal/",
  ".cortex/doctrine/",
  "SPEC.md",
  "scripts/merge-pr.sh",
  "scripts/open-pr.sh",
  "scripts/codex-review.sh",
  "scripts/conductor-review.sh",
  ".touchstone-review.toml",
  ".codex-review.toml",
]

[review]
enabled = false
comment_on_clean = false
reviewer = "conductor"

[review.conductor]
prefer = "best"
effort = "high"
tags = "code-review"
with = "codex"
